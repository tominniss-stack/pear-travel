services:
  # ─────────────────────────────────────────
  # Next.js Application (Frontend + API)
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: trips_app
    restart: unless-stopped
    ports:
      - '3004:3000'
    environment:
      - DATABASE_URL=postgresql://trips_user:teampear1@db:5432/trips_db?schema=public
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NEXT_PUBLIC_GOOGLE_PLACES_API_KEY=${NEXT_PUBLIC_GOOGLE_PLACES_API_KEY}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY} 
      - NEXTAUTH_URL=http://localhost:3004
      - NODE_ENV=development
      # NEW: Explicitly define where local uploads should be saved inside the container
      - UPLOAD_DIR=/app/public/uploads
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./public:/app/public
      - ${HOST_UPLOAD_PATH}:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - trips_network

  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: trips_db
    restart: unless-stopped
    ports:
      # Expose to host for local DB tooling
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - trips_network

  # ─────────────────────────────────────────
  # pgAdmin (Optional: DB management UI)
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: trips_pgadmin
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - trips_network
    profiles:
      - tools

# ─────────────────────────────────────────
# Named Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  app_node_modules:
    driver: local

# ─────────────────────────────────────────
# Networks
# ─────────────────────────────────────────
networks:
  trips_network:
    driver: bridge