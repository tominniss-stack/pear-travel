version: '3.8'

services:
  # ─────────────────────────────────────────
  # Next.js Application (Production)
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_GOOGLE_PLACES_API_KEY=${NEXT_PUBLIC_GOOGLE_PLACES_API_KEY}
    container_name: pear_travel_prod
    restart: always
    ports:
      - '3004:3000' # Change the left side if you want a different external port
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NEXT_PUBLIC_GOOGLE_PLACES_API_KEY=${NEXT_PUBLIC_GOOGLE_PLACES_API_KEY}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY} 
      - NEXTAUTH_URL=${NEXTAUTH_URL} # Must be your actual live domain (e.g., https://peartravel.com)
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET} # CRITICAL: Add a random 32+ char string
      - NODE_ENV=production
      - UPLOAD_DIR=/app/public/uploads
    volumes:
      - pear_travel_uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pear_network

  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pear_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pear_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pear_network

# ─────────────────────────────────────────
# Named Volumes & Networks
# ─────────────────────────────────────────
volumes:
  pear_postgres_data:
  pear_travel_uploads:

networks:
  pear_network:
    driver: bridge