version: '3.8'

services:
  # ─────────────────────────────────────────
  # Next.js Application (Production)
  # ─────────────────────────────────────────
  app:
    image: ghcr.io/tominniss-stack/pear-travel:latest
    container_name: pear_travel_prod
    restart: unless-stopped
    ports:
      - '3004:3000'
    environment:
      - DATABASE_URL
      - GEMINI_API_KEY
      - NEXT_PUBLIC_GOOGLE_PLACES_API_KEY
      - GOOGLE_PLACES_API_KEY
      - NEXTAUTH_URL
      - NEXTAUTH_SECRET
      - NODE_ENV=production
      - UPLOAD_DIR=/app/public/uploads
    volumes:
      - pear_travel_uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - pear_network

  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pear_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pear_network

# ─────────────────────────────────────────
# Named Volumes & Networks
# ─────────────────────────────────────────
volumes:
  postgres_data:
  pear_travel_uploads:

networks:
  pear_network:
    driver: bridge 
    